name: Release Windows Setup

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag. Empty means v<package.json version>.'
        required: false
        type: string
      release_title:
        description: 'Release title. Empty means Q-music <tag>.'
        required: false
        type: string
      draft:
        description: 'Create a draft release when the release does not exist.'
        required: true
        default: true
        type: boolean
      prerelease:
        description: 'Mark the release as a pre-release.'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

env:
  IS_CI: 'true'
  Q_MUSIC_GITHUB_OWNER: Nshpiter
  Q_MUSIC_GITHUB_REPO: Q-music

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out git repository
        uses: actions/checkout@v6

      - name: Get npm cache directory
        run: echo "NPM_CACHE=$(npm config get cache)" >> $env:GITHUB_ENV

      - name: Setup Node Env
        env:
          NPM_CACHE: ${{ env.NPM_CACHE }}
        uses: ./.github/actions/setup

      - name: Resolve release metadata
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagName = '${{ github.ref_name }}'

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $inputTag = '${{ inputs.tag_name }}'
            if ([string]::IsNullOrWhiteSpace($inputTag)) {
              $tagName = "v$packageVersion"
            } else {
              $tagName = $inputTag
            }
          }

          $expectedTag = "v$packageVersion"
          if ($tagName -ne $expectedTag) {
            throw "Release tag '$tagName' does not match package.json version '$expectedTag'. Update package.json first."
          }

          $releaseTitle = '${{ inputs.release_title }}'
          if ([string]::IsNullOrWhiteSpace($releaseTitle)) {
            $releaseTitle = "Q-music $tagName"
          }

          $releaseDraft = 'false'
          $releasePrerelease = 'false'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $releaseDraft = '${{ inputs.draft }}'
            $releasePrerelease = '${{ inputs.prerelease }}'
          }

          echo "PACKAGE_VERSION=$packageVersion" >> $env:GITHUB_ENV
          echo "TAG_NAME=$tagName" >> $env:GITHUB_ENV
          echo "RELEASE_TITLE=$releaseTitle" >> $env:GITHUB_ENV
          echo "RELEASE_DRAFT=$releaseDraft" >> $env:GITHUB_ENV
          echo "RELEASE_PRERELEASE=$releasePrerelease" >> $env:GITHUB_ENV

      - name: Lint
        run: npm run lint

      - name: Build Windows x64 installer
        run: npm run pack

      - name: Print installer SHA256
        run: |
          Get-FileHash "build/Q-music-v$env:PACKAGE_VERSION-x64-Setup.exe" -Algorithm SHA256 | Format-List

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = @(
            "build/Q-music-v$env:PACKAGE_VERSION-x64-Setup.exe",
            "build/Q-music-v$env:PACKAGE_VERSION-x64-Setup.exe.blockmap",
            "build/latest.yml"
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) {
              throw "Missing release asset: $asset"
            }
          }

          gh release view $env:TAG_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME @assets --repo $env:GITHUB_REPOSITORY --clobber
            exit $LASTEXITCODE
          }

          $releaseArgs = @(
            'release',
            'create',
            $env:TAG_NAME
          )
          $releaseArgs += $assets
          $releaseArgs += @(
            '--repo',
            $env:GITHUB_REPOSITORY,
            '--target',
            $env:GITHUB_SHA,
            '--title',
            $env:RELEASE_TITLE,
            '--generate-notes'
          )

          if ($env:RELEASE_DRAFT -eq 'true') {
            $releaseArgs += '--draft'
          }
          if ($env:RELEASE_PRERELEASE -eq 'true') {
            $releaseArgs += '--prerelease'
          }

          gh @releaseArgs
